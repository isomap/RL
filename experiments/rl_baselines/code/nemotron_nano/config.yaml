# GRPO code training: Nemotron Nano post-trained (4 nodes, 8 GPUs, DFW)
# Based on Qwen3-30B-A3B architecture. Model path TBD.
defaults: ../../../../examples/configs/grpo_math_1B.yaml

grpo:
  num_prompts_per_step: 64
  num_generations_per_prompt: 16
  val_period: 10
  val_at_start: true

loss_fn:
  reference_policy_kl_penalty: 0
  use_importance_sampling_correction: true
  token_level_loss: true

checkpointing:
  checkpoint_dir: experiments/rl_baselines/code/nemotron_nano/results
  save_period: 10
  keep_top_k: 3

policy:
  model_name: TBD  # Update with NVIDIA Nemotron Nano post-trained path
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 40960
  logprob_chunk_size: 2048
  dtensor_cfg:
    enabled: false
  optimizer: null
  scheduler: null
  sequence_packing:
    enabled: true
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64
  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  megatron_cfg:
    enabled: true
    activation_checkpointing: true
    tensor_model_parallel_size: 4
    expert_model_parallel_size: 8
    context_parallel_size: 1
    pipeline_model_parallel_size: 1
    sequence_parallel: true
    defer_fp32_logits: true
    moe_permute_fusion: true
    apply_rope_fusion: true
    bias_activation_fusion: true
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    optimizer:
      lr: 5.0e-07
      min_lr: 5.0e-08
      weight_decay: 0.01
      use_precision_aware_optimizer: true
    scheduler:
      lr_warmup_iters: 10
      lr_warmup_init: 5.0e-08
  generation:
    vllm_cfg:
      tensor_parallel_size: 4
      gpu_memory_utilization: 0.7

data:
  default:
    processor: null
    env_name: "code"
  max_input_seq_length: 4096

env:
  code:
    num_workers: 16

logger:
  log_dir: experiments/rl_baselines/code/nemotron_nano/logs
  wandb_enabled: true
  tensorboard_enabled: true
  monitor_gpus: true
  wandb:
    project: rl-baselines
    name: grpo-code-nemotron-nano-4n8g

cluster:
  gpus_per_node: 8
  num_nodes: 4
