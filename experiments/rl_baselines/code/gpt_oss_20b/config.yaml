# GRPO code training: GPT-OSS 20B (8 nodes, 8 GPUs, DFW)
# NOTE: model_name TBD - update when internal path is available
defaults: ../../../../examples/configs/grpo_math_1B.yaml

grpo:
  num_prompts_per_step: 64
  num_generations_per_prompt: 32
  val_period: 10
  val_at_start: true

loss_fn:
  reference_policy_kl_penalty: 0
  use_importance_sampling_correction: true
  token_level_loss: true

checkpointing:
  checkpoint_dir: experiments/rl_baselines/code/gpt_oss_20b/results
  save_period: 10
  keep_top_k: 3

policy:
  model_name: openai/gpt-oss-20b  # TBD: update with internal path
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 4096  # TBD: update when model max context is known
  dtensor_cfg:
    enabled: false
  optimizer: null
  scheduler: null
  sequence_packing:
    enabled: false
  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  megatron_cfg:
    enabled: true
    activation_checkpointing: true
    tensor_model_parallel_size: 4
    expert_model_parallel_size: 8
    context_parallel_size: 1
    pipeline_model_parallel_size: 1
    sequence_parallel: true
    moe_permute_fusion: true
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    optimizer:
      lr: 5.0e-07
      min_lr: 5.0e-08
      weight_decay: 0.01
      use_precision_aware_optimizer: true
    scheduler:
      lr_warmup_iters: 10
      lr_warmup_init: 5.0e-08
  generation:
    vllm_cfg:
      tensor_parallel_size: 2

data:
  default:
    processor: null
    env_name: "code"
  max_input_seq_length: 4096

env:
  code:
    num_workers: 16

logger:
  log_dir: experiments/rl_baselines/code/gpt_oss_20b/logs
  wandb_enabled: true
  tensorboard_enabled: true
  monitor_gpus: true
  wandb:
    project: rl-baselines
    name: grpo-code-gptoss-20b-8n8g

cluster:
  gpus_per_node: 8
  num_nodes: 8
